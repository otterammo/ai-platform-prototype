apiVersion: ai.platform/v1
kind: Workspace
metadata:
  name: demo
spec:
  rootPath: ../examples/demo
---
apiVersion: ai.platform/v1
kind: Model
metadata:
  name: stub-model
spec:
  config:
    provider: stub
    model: stub-model
---
apiVersion: ai.platform/v1
kind: Tool
metadata:
  name: filesystem
spec:
  description: Read and write workspace files
---
apiVersion: ai.platform/v1
kind: Tool
metadata:
  name: git
spec:
  description: Inspect and prepare source changes
---
apiVersion: ai.platform/v1
kind: Capability
metadata:
  name: plan
spec:
  requires:
    tools:
      - filesystem
  compatibleModels:
    - stub-model
---
apiVersion: ai.platform/v1
kind: Capability
metadata:
  name: implement
spec:
  requires:
    tools:
      - filesystem
      - git
  compatibleModels:
    - stub-model
---
apiVersion: ai.platform/v1
kind: Capability
metadata:
  name: review
spec:
  requires:
    tools:
      - git
  compatibleModels:
    - stub-model
---
apiVersion: ai.platform/v1
kind: FleetTemplate
metadata:
  name: software-feature
spec:
  agents:
    - name: planner
      role: planner
      capabilities:
        - plan
    - name: coder
      role: coder
      capabilities:
        - implement
    - name: reviewer
      role: reviewer
      capabilities:
        - review
---
apiVersion: ai.platform/v1
kind: Knowledge
metadata:
  name: auth-prd
  namespace: demo
spec:
  type: PRD
  ref: knowledge://prd.md
---
apiVersion: ai.platform/v1
kind: Mission
metadata:
  name: implement-auth
  namespace: demo
spec:
  template: software-feature
  inputs:
    prd:
      ref: knowledge://prd.md
  outputs:
    code: true
    report: true
